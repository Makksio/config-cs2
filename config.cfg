// GAME
fps_max 999
fps_max_ui 999
rate 1000000
con_enable 1
gameinstructor_enable 0
cl_use_opens_buy_menu 0
cl_buywheel_nonumberpurchasing 0
cl_sniper_auto_rezoom 1
cl_silencer_mode 1

// GRAPHICS
r_fullscreen_gamma 2.2
r_drawtracers_firstperson 1

// MOUSE
sensitivity 1.5
zoom_sensitivity_ratio 0.8

// KEYBOARD
bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "shift" "+sprint"
bind "ctrl" "+duck"
bind "space" "+jump"
bind "MWHEELUP" "+jump"
bind "e" "+use"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "r" "+reload"
bind "g" "drop"
bind "f" "+lookatweapon"
bind "b" "buymenu"
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "6" "slot6"
bind "7" "slot7"
bind "8" "slot8"
bind "9" "slot9"
bind "0" "slot0"
bind "t" "+spray_menu"
bind "tab" "+showscores"
bind "m" "teammenu"
bind "`" "toggleconsole"
bind "u" "messagemode2"
bind "y" "messagemode"
bind "alt" "+voicerecord"
bind "n" "noclip"

// SOUND
volume 0.3
snd_headphone_eq 0
snd_spatialize_lerp 1
snd_steamaudio_enable_perspective_correction 1
snd_mute_losefocus 1

// VOICE
voice_modenable 1

// CROSSHAIR
cl_crosshairstyle 4
cl_crosshairsize 2
cl_crosshairthickness 0.5
cl_crosshairgap -3
cl_crosshair_drawoutline 0
cl_crosshair_outlinethickness 0
cl_crosshairdot 0
cl_crosshair_t 0
cl_crosshaircolor 1
cl_crosshaircolor_r 50
cl_crosshaircolor_g 250
cl_crosshaircolor_b 50
cl_crosshair_sniper_width 1
cl_crosshair_recoil 0
cl_crosshairgap_useweaponvalue 0
cl_crosshair_friendly_warning 0

// VIEWMODEL
viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5
viewmodel_presetpos 2
cl_prefer_lefthanded 0

// HUD
safezonex 1
safezoney 1
hud_scaling 1
cl_hud_color 0
cl_hide_avatar_images 0
cl_allow_animated_avatars 0
cl_teamcounter_playercount_instead_of_avatars 0
cl_showloadout 1
cl_weapon_selection_rarity_color 1
hud_showtargetid 1
cl_autohelp 1
cl_color 1
cl_teammate_colors_show 1

// RADAR
cl_radar_always_centered 1
cl_radar_rotate 1
cl_hud_radar_blur_background 1
cl_hud_radar_background_alpha 0.627
cl_hud_radar_scale 1
cl_radar_scale 0.7
cl_radar_scale_alternate 1
cl_radar_icon_scale_min 0.6
cl_radar_square_with_scoreboard 1
cl_radar_square_always 0
cl_radar_scale_dynamic 0

// TELEMETRY
r_show_build_info 0
cl_showfps 0
cl_hud_telemetry_frametime_show 2
cl_hud_telemetry_ping_show 2
cl_hud_telemetry_net_misdelivery_show 2



host_writeconfig
